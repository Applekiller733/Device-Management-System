<div class="device-list-container">
  <header class="page-header">
    <h1 class="page-title">Managed Devices</h1>
    
    <div class="search-container">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Search devices...</mat-label>
        <input matInput [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
      </mat-form-field>
      <button mat-stroked-button (click)="onSearch()">Search</button>
    </div>
    
    <div class="header-actions">
      <button mat-button class="btn-danger" (click)="logout()">Logout</button>
      <button mat-raised-button color="primary" (click)="createNewDevice()">Add New Device</button>
    </div>
  </header>

  <table mat-table [dataSource]="devices" class="mat-elevation-z2">
    
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Device Name </th>
      <td mat-cell *matCellDef="let d"> {{d.name}} </td>
    </ng-container>

    <ng-container matColumnDef="manufacturer">
      <th mat-header-cell *matHeaderCellDef> Manufacturer </th>
      <td mat-cell *matCellDef="let d"> {{d.manufacturer}} </td>
    </ng-container>

    <ng-container matColumnDef="assignedTo">
      <th mat-header-cell *matHeaderCellDef> Assigned To </th>
      <td mat-cell *matCellDef="let d"> 
        {{ getUserName(d.assignedUserId) }} 
      </td>
    </ng-container>

    <ng-container matColumnDef="assignAction">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let d" class="action-cell">
        <button mat-button *ngIf="!d.assignedUserId" (click)="assignToMe(d.id)">Assign</button>
        <button mat-button class="btn-danger" *ngIf="d.assignedUserId === currentUserId" (click)="unassign(d.id)">Unassign</button>
        <p mat-subtitle *ngIf="d.assignedUserId && d.assignedUserId !== currentUserId" class="assigned-label">In Use</p>
      </td>
    </ng-container>

    <ng-container matColumnDef="viewAction">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let d" class="action-cell">
        <button mat-stroked-button (click)="viewDetails(d.id)">View</button>
      </td>
    </ng-container>
  
    <ng-container matColumnDef="deleteAction">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let d" class="action-cell">
        <button mat-flat-button class="btn-danger" (click)="deleteDevice(d.id)">Delete</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name', 'manufacturer', 'assignedTo', 'assignAction', 'viewAction', 'deleteAction']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['name', 'manufacturer', 'assignedTo', 'assignAction', 'viewAction', 'deleteAction'];"></tr>
  </table>
</div>
