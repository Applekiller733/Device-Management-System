<div class="auth-wrapper">
  <mat-card appearance="outlined" class="auth-card">
    <mat-card-header>
      <mat-card-title><h2>Create Account</h2></mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        
        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="e.g. John Doe">
          <mat-error *ngIf="registerForm.get('name')?.invalid">Name is required.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="name@company.com">
          <mat-error *ngIf="registerForm.get('email')?.invalid">Please enter a valid email.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Min. 6 characters">
          <mat-error *ngIf="registerForm.get('password')?.invalid">Password must be at least 6 characters.</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid">
          Create Account
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="footer-text">
      <p>
        Already have an account? <a routerLink="/login">Sign In</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
